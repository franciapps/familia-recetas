<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#064e3b"/>
      <stop offset="100%" style="stop-color:#065f46"/>
    </linearGradient>
    <linearGradient id="plate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f9fafb"/>
      <stop offset="100%" style="stop-color:#f3f4f6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" rx="0"/>

  <!-- Decorative circles -->
  <circle cx="650" cy="-30" r="120" fill="#047857" opacity="0.4"/>
  <circle cx="100" cy="320" r="100" fill="#065f46" opacity="0.5"/>
  <circle cx="780" cy="250" r="80" fill="#047857" opacity="0.3"/>

  <!-- Big plate -->
  <ellipse cx="400" cy="200" rx="170" ry="22" fill="#d1fae5" opacity="0.15"/>
  <ellipse cx="400" cy="185" rx="155" ry="20" fill="#6ee7b7" opacity="0.1"/>

  <!-- Olla express (pressure cooker) -->
  <rect x="300" y="110" width="200" height="110" rx="20" fill="#374151"/>
  <rect x="295" y="108" width="210" height="20" rx="10" fill="#4b5563"/>
  <rect x="335" y="90" width="130" height="22" rx="8" fill="#4b5563"/>
  <!-- handle left -->
  <rect x="260" y="125" width="42" height="18" rx="9" fill="#6b7280"/>
  <!-- handle right -->
  <rect x="498" y="125" width="42" height="18" rx="9" fill="#6b7280"/>
  <!-- valve -->
  <rect x="387" y="82" width="26" height="12" rx="6" fill="#9ca3af"/>
  <circle cx="400" cy="82" r="7" fill="#6b7280"/>
  <!-- steam -->
  <path d="M390 68 Q385 55 390 45 Q395 35 390 25" stroke="#d1fae5" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M400 65 Q395 52 400 42 Q405 32 400 22" stroke="#d1fae5" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M410 68 Q415 55 410 45 Q405 35 410 25" stroke="#d1fae5" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- Carrot left -->
  <ellipse cx="185" cy="185" rx="18" ry="55" fill="#f97316" transform="rotate(-20 185 185)"/>
  <path d="M175 135 Q185 120 195 130" stroke="#16a34a" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M180 133 Q178 118 172 112" stroke="#16a34a" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Zucchini right -->
  <ellipse cx="615" cy="175" rx="16" ry="60" fill="#4ade80" transform="rotate(15 615 175)"/>
  <ellipse cx="615" cy="175" rx="10" ry="60" fill="#22c55e" opacity="0.5" transform="rotate(15 615 175)"/>
  <circle cx="606" cy="122" r="10" fill="#16a34a"/>

  <!-- Taco left floating -->
  <ellipse cx="140" cy="130" rx="45" ry="28" fill="#fef3c7" transform="rotate(-10 140 130)"/>
  <path d="M100 125 Q140 80 180 125" fill="#fbbf24" opacity="0.8"/>
  <!-- filling -->
  <ellipse cx="135" cy="118" rx="18" ry="8" fill="#ef4444" opacity="0.8" transform="rotate(-10 135 118)"/>
  <ellipse cx="148" cy="115" rx="12" ry="6" fill="#4ade80" opacity="0.9" transform="rotate(-10 148 115)"/>

  <!-- Fish right floating -->
  <ellipse cx="660" cy="110" rx="42" ry="22" fill="#bae6fd" transform="rotate(10 660 110)"/>
  <path d="M695 95 L715 80 L715 108 Z" fill="#7dd3fc"/>
  <circle cx="645" cy="106" r="4" fill="#1e40af" opacity="0.7"/>

  <!-- Avocado bottom left -->
  <ellipse cx="220" cy="245" rx="25" ry="32" fill="#4ade80"/>
  <ellipse cx="220" cy="248" rx="17" ry="22" fill="#86efac"/>
  <ellipse cx="220" cy="252" rx="9" ry="12" fill="#92400e"/>

  <!-- Tomato bottom right -->
  <circle cx="580" cy="248" r="26" fill="#ef4444"/>
  <circle cx="580" cy="248" r="18" fill="#f87171" opacity="0.5"/>
  <path d="M572 225 Q580 215 588 225" stroke="#16a34a" stroke-width="3" fill="none"/>
  <line x1="580" y1="225" x2="580" y2="215" stroke="#16a34a" stroke-width="2.5"/>

  <!-- Text -->
  <text x="400" y="258" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#d1fae5" letter-spacing="3" opacity="0.9">FAMILIA SARRECCHIA</text>
  <text x="400" y="278" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#6ee7b7" letter-spacing="5" opacity="0.7">MENÚ SEMANAL</text>
</svg>
